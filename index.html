};


let pkData=[];

fetch('pk_lleida.json')
.then(r=>r.json())
.then(d=>pkData=d)
.catch(()=>console.log('No s\'ha pogut carregar pk_lleida.json'));

function distancia(lat1,lon1,lat2,lon2){
 const R=6371000;
 const toRad=x=>x*Math.PI/180;
 const dLat=toRad(lat2-lat1);
 const dLon=toRad(lon2-lon1);
 const a=Math.sin(dLat/2)**2+
 Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
 return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function pkMesProper(lat,lon){
 if(!pkData.length) return null;
 let millor=null,dist=1e20;
 for(const p of pkData){
   const d=distancia(lat,lon,p[3],p[4]);
   if(d<dist){dist=d;millor=p;}
 }
 return {carretera:millor[0],pk:millor[1],sentit:millor[2],dist:Math.round(dist)};
}


async function buscar(){

    resultat.innerHTML="Obtenint GPS...";

    navigator.geolocation.getCurrentPosition(async(pos)=>{

        const lat=pos.coords.latitude;
        const lon=pos.coords.longitude;
        const precisio=pos.coords.accuracy;
        const pk=pkMesProper(lat,lon);

        const ara=new Date();
        const data=ara.toLocaleDateString('ca-ES');
        const hora=ara.toLocaleTimeString('ca-ES');

        try{

            const resposta=await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=ca`
            );

            const json=await resposta.json();

            const municipi=
                json.address.municipality ||
                json.address.city ||
                json.address.town ||
                json.address.village;

            if(!municipi){
                resultat.innerHTML="No s'ha pogut determinar el municipi.";
                return;
            }

            const partit=partits[municipi];
            const jutjat=jutjats[partit];

            if(!partit){
                resultat.innerHTML=`
                <b>Municipi:</b> ${municipi}<br><br>
                <span style="color:red;font-weight:bold">
                Fora de la província de Lleida o municipi no inclòs a la base de dades.
                </span>`;
                return;
            }

            resultat.innerHTML=`
                <b>Municipi:</b> ${municipi}<br>
                <b>Partit judicial:</b> ${partit}<hr><b>${jutjat.nom}</b><br>
                📍 ${jutjat.adreca}<br>
                ☎️ ${jutjat.telefon}<hr><b>🛰️ Coordenades GPS</b><br>
                Latitud: ${lat.toFixed(6)}<br>
                Longitud: ${lon.toFixed(6)}<br>
                Precisió: ±${Math.round(precisio)} m<hr><b>🛣️ Carretera:</b> ${pk?pk.carretera:'-'}<br>
                <b>PK:</b> ${pk?pk.pk:'-'}<br>
                <b>Sentit:</b> ${pk?pk.sentit:'-'}<br>
                <b>Distància al PK:</b> ${pk?pk.dist+' m':'-'}<hr><b>🕒 Data:</b> ${data}<br>
                <b>Hora:</b> ${hora}`;

        }catch(e){

            resultat.innerHTML="Error consultant OpenStreetMap.";

        }

    },()=>{

        resultat.innerHTML="No s'ha pogut obtenir el GPS.";

    });

}
